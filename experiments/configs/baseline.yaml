model: fasterrcnn_r50_fpn
num_classes: 2         # 背景+豬
freeze_backbone: true
train:
  batch_size: 1        # 1650 先這樣
  epochs: 12
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0001
  step_size: 5
  gamma: 0.1
data:
  train_img_dir: data/train/img
  train_gt: data/train/gt.txt
  test_img_dir: data/test/img
