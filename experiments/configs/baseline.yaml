model: fasterrcnn_r50_fpn
num_classes: 2
freeze_backbone: true

train:
  batch_size: 4            # 3080 可先 4（看顯存再調 2/8）
  epochs: 12
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0001
  step_size: 5
  gamma: 0.1
  max_side: 800            # 輸入最長邊
  num_workers: 4

rpn:
  anchor_sizes: [[32, 64], [64, 128], [128, 256], [256, 512]]
  aspect_ratios: [[0.75, 1.0, 1.5], [0.75, 1.0, 1.5], [0.75, 1.0, 1.5], [0.75, 1.0, 1.5]]
