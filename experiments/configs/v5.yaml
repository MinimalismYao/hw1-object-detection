seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v5
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16

model:
  detector: fasterrcnn_r50_fpn
  backbone: resnet50
  num_classes: 2
  freeze_backbone: false
  pretrained_backbone: false         # ← 對齊 modelv5.py 的參數名稱（原本是 pretrained）

  # 與前處理對齊，避免 GeneralizedRCNNTransform 再縮放一次
  min_size: 1280                     # ← 等同 augment.max_side
  max_size: 1280

  # === 小物體強化 ===
  rpn_anchor_sizes: [[8], [16], [32], [64], [128]]
  rpn_anchor_ratios: [0.5, 1.0, 2.0]

  # 提高 RPN 提案數（訓練/測試）
  rpn_pre_nms_top_n_train: 4000
  rpn_post_nms_top_n_train: 2000
  rpn_pre_nms_top_n_test:  3000
  rpn_post_nms_top_n_test: 1000
  rpn_nms_thresh: 0.7

  # 讓 RCNN 內部的推論閾值 / NMS 與外部設定一致（非必填，但能避免混亂）
  box_score_thresh: ${infer.score_thr}
  box_nms_thresh:   ${infer.nms_iou}
  box_detections_per_img: ${eval.max_det}

augment:
  max_side: 1280
  resize: null
  flip_p: 0.5
  hsv: false
  mosaic: false

train:
  epochs: 36
  batch_size: 4
  grad_clip: 10.0
  amp: true
  cudnn_benchmark: true
  accumulate: 1

optimizer:
  type: sgd
  lr: 0.003
  weight_decay: 1.0e-4
  momentum: 0.9

scheduler:
  type: steplr
  step_size: 5
  gamma: 0.1

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: true
  save_full_path: ${checkpoint.dir}/${checkpoint.name}
  # save_fp16: true   # 想讓 ckpt 檔案縮半，可打開

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 100
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json}

infer:
  score_thr: 0.03
  nms_iou: 0.5
  submission_csv: submissions/${project.run_name}_submission.csv

device:
  cuda: true

early_stop:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 8
  save_best: true
  best_name: ${project.run_name}_best.pth
