# experiments/configs/v7.yaml
# =========================
# hw1_od · fasterrcnn_v7 (R101 + FPN P2~P6 + Big RoI Head)
# 目標：強化模型容量、小物件召回與定位穩定度；鍵名完全對齊 trainv7.py
# =========================

seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2                 # torchvision Faster R-CNN: 含背景 → 單類別時填 2
  # 與 transforms 對齊的正規化
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  # 尺寸（訓練/推論一致，避免二次縮放）
  min_size: 1280
  max_size: 1280

  # FPN / Norm
  fpn_out_channels: 256
  use_p6: true                   # 產生 P6（C5 上 MaxPool）
  norm: "groupnorm32"            # 從零訓練更穩；可選：bn / frozenbn / groupnorm32

  # Anchors（小物件友善：min=8、含 3.0 長條）
  rpn_anchor_sizes: [8, 16, 32, 64, 128, 256]
  rpn_anchor_ratios: [0.5, 1.0, 2.0, 3.0]

  # RPN（密集場景：多收 proposals）
  rpn:
    batch_size_per_image: 1024
    positive_fraction: 0.5
    fg_iou_thresh: 0.6
    bg_iou_thresh: 0.2
    pre_nms_top_n_train: 6000
    post_nms_top_n_train: 3000
    pre_nms_top_n_test:  3000
    post_nms_top_n_test: 1500
    nms_thresh: 0.7

  # RoI / Head（大容量）
  roi:
    roi_pool_size: 14
    head_hidden_dim: 1024
    head_num_fc: 4
    bbox_reg_weights: [10.0, 10.0, 5.0, 5.0]
    nms_thresh: 0.5
    detections_per_img: 300
    score_thresh: 0.0

augment:
  # 多尺度訓練（短邊候選），長邊 cap 於 max_side
  resize: [1024, 1280]           # 與 model.{min,max}_size=1280 對齊，比較省時
  max_side: 1280
  flip_p: 0.5
  hsv: [0.015, 0.70, 0.40]
  color_jitter_prob: 0.8
  color_jitter: [0.2, 0.2, 0.2, 0.05]
  mosaic: false                  # 依你的 transforms.py，如需可打開

train:
  epochs: 72
  batch_size: 2
  accumulate: 8                  # 有效 batch = 16
  amp: true
  cudnn_benchmark: true
  grad_clip: 1.0                 # trainv7.py 讀的是 grad_clip（非 grad_clip_norm）

optimizer:
  type: sgd
  lr: 0.012
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  type: steplr                   # trainv7.py 目前只支援 StepLR
  step_size: 8
  gamma: 0.1

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false          # 如要省空間可改 true
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]        # 32^2
    medium: [1024, 9216]     # 96^2
    large:  [9216, 1e10]

infer:
  score_thr: 0.05
  nms_iou: 0.5
  submission_csv: submissions/${project.run_name}_submission.csv
  # 若之後改回 RetinaNet/要加強推論，可在 infer.postproc 加 Soft-NMS/TopK/Tiling

device:
  cuda: true

# ←←← 早停放在 root（train 外），才能被 trainv7.py 讀到
early_stop:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 6
  save_best: true
  best_name: ${project.run_name}_best.pth
