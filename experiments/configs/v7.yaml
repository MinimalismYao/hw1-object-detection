# =========================
# hw1_od · fasterrcnn_v6 (Stable on 3080)
# 重點：顯存穩 + 不卡 I/O
# - 輸入改 1280（多尺度：768/960/1152/1280）
# - batch_size=2 + accumulate=8 保持等效大 batch
# - 降低 RPN/ROI 的 proposals/樣本數，降低 VRAM 風險
# - DataLoader 降 worker/prefetch，避免磁碟/CPU 互踩
# 如果你一定要 1536 輸入，見下方「# 1536 模式」註解
# =========================
#fasterrcnn_r50_fpn（two-stage, 中等容量）
#穩定好調、對中大型物體表現穩；RPN+RoI 使小物件需要更細的 anchor/尺寸策略才能拉起。訓練時間中等，記憶體需求中等。

#fasterrcnn_mbv3_fpn（two-stage, 輕量）
#用 MobileNetV3 骨幹，參數/算力需求低，適合快速迭代或較弱的 GPU；準度略低於 R50，但速度與穩定性很好。

#fasterrcnn_r101_fpn（two-stage, 大容量）
#特徵表達更強，對複雜外觀、遮擋有幫助；訓練慢、VRAM 吃重，較容易過擬合，需規律正則/early-stop。

#retinanet_r50_fpn（one-stage, 密集偵測）
#Focal Loss 抑制易樣本，通常對小物件/密集場景更友善；推論較快、記憶體較省（無 RoI 阶段），調到對就常見到小物件 AP 明顯回升。

#ssdlite_mbv3（one-stage, 超輕量）
#速度極快、資源消耗最低；適合 baseline 建立與快速 A/B，精度通常低於 RetinaNet/FasterRCNN，但在 3080 上可超高速反覆測。
# =========================

seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v6
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 8             # ↓ from 16，避免 I/O 過度前置
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

model:
  # 可選：fasterrcnn_r50_fpn / fasterrcnn_mbv3_fpn / fasterrcnn_r101_fpn / retinanet_r50_fpn / ssdlite_mbv3
  detector: fasterrcnn_r50_fpn
  backbone: resnet50
  num_classes: 2
  pretrained_backbone: false
  freeze_backbone: false

  # 與前處理對齊（避免 Transform 與 Model 正規化不一致）
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  # 輸入尺寸（穩定：1280）
  min_size: 1280            # ← 1536 模式請改回 1536
  max_size: 1280

  # Anchors（FPN：P2~P6；小物件友善）
  rpn_anchor_sizes: [[16], [32], [64], [128], [512]]
  rpn_anchor_ratios: [0.33, 0.5, 1.0, 2.0, 3.0]

  # RPN（瘦身，降 VRAM）
  rpn_batch_size_per_image: 512
  rpn_positive_fraction: 0.5
  rpn_fg_iou_thresh: 0.6
  rpn_bg_iou_thresh: 0.2
  rpn_pre_nms_top_n_train: 4000   
  rpn_post_nms_top_n_train: 2000  
  rpn_pre_nms_top_n_test:  2000  
  rpn_post_nms_top_n_test: 1000    
  rpn_nms_thresh: 0.7

  # ROI Head（瘦身，降 VRAM）
  box_batch_size_per_image: 1024 
  box_positive_fraction: 0.5
  box_score_thresh: ${infer.score_thr}
  box_nms_thresh:   ${infer.nms_iou}
  box_detections_per_img: ${eval.max_det}

augment:
  # ---- 旗標類（FRCNN 不建議開）----
  mosaic: false
  mixup: false
  cutout: false
  blur_p: 0.0
  noise_p: 0.0
  sharpen_p: 0.0
  affine_p: 0.0
  perspective_p: 0.0

  # ---- Resize（短邊候選清單，長邊上限）----
  resize: [768, 960, 1152, 1280]  # ← 1280 穩定版
  max_side: 1280

  # 其它增強
  flip_p: 0.5
  hsv: [0.015, 0.70, 0.40]
  color_jitter_prob: 0.8
  color_jitter: [0.2, 0.2, 0.2, 0.05]
  random_crop_prob: 0.20
  random_crop_min_iou: 0.5
  gaussian_blur_prob: 0.10
  gaussian_blur_sigma: [0.1, 1.0]
  random_noise_prob: 0.10

  # 注意：與 model.image_mean/std 同步
  normalize_mean_std: [[0.485, 0.456, 0.406],[0.229, 0.224, 0.225]]

train:
  epochs: 36
  batch_size: 2             # ↓ from 4，顯存更穩
  grad_clip: 10.0
  amp: true
  cudnn_benchmark: true
  accumulate: 8             # ↑ from 4，維持等效大 batch

  sampler:
    enabled: false
    strategy: "area_weighted"
    small_quantile: 0.15
    large_quantile: 0.85
    small_weight: 2.0
    large_weight: 1.5
    normal_weight: 1.0
    cache_path: ${project.output_dir}/train_sampler_weights.npy

optimizer:
  type: sgd
  lr: 0.01
  momentum: 0.9
  weight_decay: 5.0e-4

scheduler:
  type: steplr
  step_size: 8
  gamma: 0.1

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2        # ↓ from 4，降低 I/O 壓力
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: true
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small: [0, 1024]       # 32^2
    medium: [1024, 9216]   # 96^2
    large: [9216, 1e10]
  

infer:
  score_thr: 0.02
  nms_iou: 0.6
  submission_csv: submissions/${project.run_name}_submission.csv
  postproc:
    soft_nms:
      enabled: true
      method: "gaussian"
      sigma: 0.5
      iou_thresh: 0.6
      score_thresh: 0.0
    area_aware_score:
      enabled: true
      small_thr: 0.02
      medium_thr: 0.04
      large_thr: 0.06
      small_area: 1024
      large_area: 9216
    topk_per_image: 300
    temperature_scaling:
      enabled: false
      T: 1.0

device:
  cuda: true

early_stop:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 5
  save_best: true
  best_name: ${project.run_name}_best.pth

