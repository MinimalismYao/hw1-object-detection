# experiments/configs/v7.yaml
# =========================
# hw1_od · fasterrcnn_v7 (R101 + FPN P2~P6 + Big RoI Head)
# 目標：在不花俏的前提下，讓模型「穩定自然地收斂」、降低 loss，並提升小物件 AP
# =========================

seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2                 # Faster R-CNN: 含背景 → 前景1類 + 背景 = 2
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  # 輸入尺度（與 transforms 對齊，避免 Transform 反覆縮放）
  min_size: 1280
  max_size: 1280

  # FPN / Norm
  fpn_out_channels: 256
  use_p6: true
  norm: "groupnorm32"

  # Anchors：小物件友善，但避免極端；與 P2~P6 相容
  rpn_anchor_sizes:  [8, 12, 16, 24, 32, 48]
  rpn_anchor_ratios: [0.5, 1.0, 2.0, 3.0]

  # RPN：提案數合理、抑制背景；避免過多 proposal 造成訓練不穩
  rpn:
    batch_size_per_image: 512
    positive_fraction: 0.5
    fg_iou_thresh: 0.6
    bg_iou_thresh: 0.2
    pre_nms_top_n_train: 4000
    post_nms_top_n_train: 2000
    pre_nms_top_n_test:  2000
    post_nms_top_n_test: 1000
    nms_thresh: 0.7

  # RoI / Head：較深的 head 有助小物件特徵，輸出數量收斂避免噪點
  roi:
    roi_pool_size: 14
    head_hidden_dim: 1024
    head_num_fc: 4
    bbox_reg_weights: [10.0, 10.0, 5.0, 5.0]
    nms_thresh: 0.5
    detections_per_img: 200
    score_thresh: 0.0
    box_batch_size_per_image: 1024
    box_positive_fraction: 0.33

augment:
  # 多尺度但不誇張，與 model.min/max_size 一致，避免反覆 resize
  resize: [1024, 1280]
  max_side: 1280
  flip_p: 0.5
  hsv: [0.015, 0.70, 0.40]
  color_jitter_prob: 0.4
  color_jitter: [0.1, 0.1, 0.1, 0.03]
  mosaic: false

train:
  epochs: 48                # 以 Cosine 調度下，48 較易於穩定下降；不足可再延長
  batch_size: 2
  accumulate: 8             # 等效大 batch，提升穩定度
  amp: true
  cudnn_benchmark: true
  grad_clip: 1.0            # 避免偶發爆梯

  model_ema:
    enabled: true
    decay: 0.9995

  early_stop:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 8
    save_best: true
    best_name: ${project.run_name}_best.pth

optimizer:
  type: sgd                  # 經驗上 FRCNN + SGD 更穩；若顯存足且想快收斂可換 AdamW
  lr: 0.010                  # 等效 batch≈(batch_size*accumulate)=16 → 0.01 是穩健起點
  momentum: 0.9
  weight_decay: 0.0005

# 建議預設：Cosine + Warmup（較不易發散、loss 平滑下降）
scheduler:
  name: cosine
  warmup:
    type: linear
    steps: 1000             # 依資料量可介於 500~1500；先取中值
    start_factor: 0.1

# 若要傳統 StepLR，改成下方這組（其餘刪除或註解）
# scheduler:
#   type: steplr
#   step_size: 8
#   gamma: 0.1

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]
    medium: [1024, 9216]
    large:  [9216, 1e10]

infer:
  # FRCNN 內部已有 NMS，外層只需提高分數閾值
  score_thr: 0.25
  nms_iou: 0.5            # 若改用 Retina/SSD，這欄才會生效
  submission_csv: submissions/${project.run_name}_submission.csv

device:
  cuda: true
