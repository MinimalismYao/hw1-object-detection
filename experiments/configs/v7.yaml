# experiments/configs/v7.yaml  (anti-overfit strong)
# Model v7: Faster R-CNN R101 FPN + 強化版 Aug + Dropout + 調整超參數（舊參數已註解）
seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

# -----------------------------
# Data (補上必需路徑)
# -----------------------------
data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2
  #norm: "frozenbn"
  norm: "bn"
  # min_size: 1024
  # max_size: 1024
  min_size: 1536
  max_size: 1536
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  fpn_out_channels: 256
  use_p6: true

  # Anchors：維持小物件友好
  # rpn_anchor_sizes_per_level: [[8],[16],[32],[64],[96]] #(kaggle 0.13)
  rpn_anchor_sizes_per_level: [[8],[16],[32],[64],[128],[256]] 
  rpn_anchor_ratios: [0.5, 1.0, 1.5]

  # RPN：略放寬正樣 (先 recall 再收斂)，但控制 proposals
  rpn:
    fg_iou_thresh: 0.5
    bg_iou_thresh: 0.1
    batch_size_per_image: 512
    positive_fraction: 0.5
    # pre_nms_top_n_train: 1200
    pre_nms_top_n_train: 6000
    # post_nms_top_n_train: 600
    post_nms_top_n_train: 6000
    # pre_nms_top_n_test:  800
    pre_nms_top_n_test:  4000
    # post_nms_top_n_test: 500
    post_nms_top_n_test: 1500
    nms_thresh: 0.7

  # RoI Head：更保守取樣 + 更小 batch，並開 Dropout（modelv7.py 已支援）
  roi:
    roi_pool_size: 7
    box_batch_size_per_image: 512
    box_positive_fraction: 0.25
    bbox_reg_weights: [1.0, 1.0, 1.0, 1.0]
    detections_per_img: 100
    score_thresh: 0.0
    nms_thresh: 0.5
    # dropout_p: 0.40
    dropout_p: 0.15

augment:
  # resize: [768, 1152]
  resize: null
  #max_side: 1024
  flip_p: 0.5
  color_jitter_prob: 0.2
  color_jitter: [0.25, 0.12, 0.12, 0.05]
  hsv: [0.02, 0.3, 0.2]
  mosaic: false

train:
  # epochs: 72
  epochs: 100
  batch_size: 2
  accumulate: 4
  # amp: false
  amp: true
  cudnn_benchmark: true
  # grad_clip: 1.0
  grad_clip: 10

  # 凍結 backbone 更久；先把頭訓練好，再解凍微調
  freeze_backbone_epochs: 12

  # EMA：略降平滑力度
  model_ema:
    enabled: true
    decay: 0.9990

  # Early Stop：更積極
  early_stop:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 8
    save_best: true
    best_name: ${project.run_name}_best.pth

  optimizer:
    type: sgd
    lr: 0.0035            # R101 + BN + 1280輸入，這個量級OK
    momentum: 0.9         # 重要！沒寫就=0
    nesterov: false       # 先關，穩定後再考慮開
    weight_decay: 0.0005
    head_lr_mult: 1.0
    backbone_lr_mult: 0.33

# 讓 cosine 收尾更低，盡量別抬起尾巴繼續擬合
scheduler:
  name: cosine
  warmup:
    type: linear
    steps: 1000
    start_factor: 0.1
  min_lr_ratio: 0.15

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 1536

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]
    medium: [1024, 9216]
    large:  [9216, 1e10]

infer:
  score_thr: 0.40
  nms_iou: 0.5
  submission_csv: submissions/${project.run_name}_submission.csv

device:
  cuda: true
