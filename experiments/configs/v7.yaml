# experiments/configs/v7.yaml
# =========================
# hw1_od · fasterrcnn_v7 (R101 + FPN P2~P6 + Big RoI Head)
# 目標：
#   - 穩定自然收斂（降低 train/val loss gap）
#   - 抑制過擬合（正則化 + 凍結 backbone + EMA）
#   - 提升小物件 AP（anchors 微縮、IoU 門檻提高）
#   - 控制顯存（1024輸入 + 低 batch + accumulate）
# =========================

seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

# ---------------------------------------------------------
# Data
# ---------------------------------------------------------
data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]      # 避免過小框導致 NaN

# ---------------------------------------------------------
# Model
# ---------------------------------------------------------
model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2

  # Normalization：改為 FrozenBN，防止小 batch 統計偏移
  norm: "frozenbn"

  # 輸入尺度（固定 1024，可保留小物件細節但穩定顯存）
  min_size: 1024
  max_size: 1024

  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  # FPN：P2~P6，強化小物件特徵層
  fpn_out_channels: 256
  use_p6: true

  # Anchors：針對小物件微縮
  rpn_anchor_sizes:  [8, 12, 16, 24, 32, 48]
  rpn_anchor_ratios: [0.5, 1.0, 2.0, 3.0]

  # RPN：保守設定，減少假陽性提案
  rpn:
    batch_size_per_image: 256       # ← 降低過擬合風險
    positive_fraction: 0.25
    fg_iou_thresh: 0.6
    bg_iou_thresh: 0.2
    pre_nms_top_n_train: 3000
    post_nms_top_n_train: 1500
    pre_nms_top_n_test:  2000
    post_nms_top_n_test: 1000
    nms_thresh: 0.7

  # RoI Head：保守取樣 + 適中正樣比例
  roi:
    roi_pool_size: 11
    head_hidden_dim: 1024
    head_num_fc: 4
    bbox_reg_weights: [10.0, 10.0, 5.0, 5.0]
    nms_thresh: 0.5
    detections_per_img: 150
    score_thresh: 0.0
    box_batch_size_per_image: 512
    box_positive_fraction: 0.33
    fg_iou_thresh: 0.6      # ← 提高，確保正樣本品質
    bg_iou_thresh: 0.1

# ---------------------------------------------------------
# Augmentation（保守增強，避免 val 分佈偏移）
# ---------------------------------------------------------
augment:
  resize: [896, 1024]
  max_side: 1024
  flip_p: 0.5
  color_jitter_prob: 0.3
  color_jitter: [0.1, 0.1, 0.1, 0.05]
  hsv: [0.02, 0.5, 0.3]
  mosaic: false             # 禁用強增強（避免 bbox 失真）

# ---------------------------------------------------------
# Train
# ---------------------------------------------------------
train:
  epochs: 54                # 延長訓練，允許 cosine 慢收斂
  batch_size: 2             # 小 batch 保守顯存
  accumulate: 8             # 等效大 batch（穩定梯度）
  amp: true
  cudnn_benchmark: true
  grad_clip: 1.0

  # Backbone 凍結：前 5 epoch 不更新主幹，防止早期震盪
  freeze_backbone_epochs: 5

  # EMA：平滑權重，驗證更穩
  model_ema:
    enabled: true
    decay: 0.9995

  # Early Stop：防止過擬合擴大
  early_stop:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 6             # 提前終止
    save_best: true
    best_name: ${project.run_name}_best.pth

# ---------------------------------------------------------
# Optimizer（小步長，穩定泛化）
# ---------------------------------------------------------
optimizer:
  type: adamw              # ← AdamW 通常在小 batch 下更穩
  lr: 0.001                # ← LR 降 3 倍避免過擬合
  weight_decay: 0.0008
  betas: [0.9, 0.999]

# ---------------------------------------------------------
# Scheduler（Cosine + Warmup）
# ---------------------------------------------------------
scheduler:
  name: cosine
  warmup:
    type: linear
    steps: 800
    start_factor: 0.1
  min_lr_ratio: 0.05

# ---------------------------------------------------------
# Dataloader
# ---------------------------------------------------------
dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

# ---------------------------------------------------------
# Sanity Check
# ---------------------------------------------------------
sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

# ---------------------------------------------------------
# Checkpoint
# ---------------------------------------------------------
checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

# ---------------------------------------------------------
# Logging
# ---------------------------------------------------------
logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

# ---------------------------------------------------------
# Evaluation
# ---------------------------------------------------------
eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]
    medium: [1024, 9216]
    large:  [9216, 1e10]

# ---------------------------------------------------------
# Inference
# ---------------------------------------------------------
infer:
  score_thr: 0.25
  nms_iou: 0.5
  submission_csv: submissions/${project.run_name}_submission.csv

# ---------------------------------------------------------
# Device
# ---------------------------------------------------------
device:
  cuda: true
