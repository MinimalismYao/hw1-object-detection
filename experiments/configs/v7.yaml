# experiments/configs/v7.yaml  (anti-overfit strong · final)
# Model v7: Faster R-CNN R101 FPN + PhotometricAug + 調參
seed: 42

project:
  name: hw1_od
  seed: 42
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

# -----------------------------
# Data
# -----------------------------
data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

# -----------------------------
# Model
# -----------------------------
model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2
  norm: "bn"

  # 與外部 transform 尺寸一致（長邊 1536）
  min_size: 1536
  max_size: 1536

  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  fpn_out_channels: 256
  use_p6: true

  # Anchors：維持小物件友好
  rpn_anchor_sizes_per_level: [[8],[16],[32],[64],[128],[256]]
  rpn_anchor_ratios: [0.5, 1.0, 1.5]

  # RPN
  rpn:
    fg_iou_thresh: 0.5
    bg_iou_thresh: 0.1
    batch_size_per_image: 512
    positive_fraction: 0.5
    pre_nms_top_n_train: 6000
    post_nms_top_n_train: 6000
    pre_nms_top_n_test:  4000
    post_nms_top_n_test: 1500
    nms_thresh: 0.7

  # RoI Head
  roi:
    roi_pool_size: 7
    box_batch_size_per_image: 512
    box_positive_fraction: 0.25
    bbox_reg_weights: [1.0, 1.0, 1.0, 1.0]
    detections_per_img: 100
    score_thresh: 0.0
    nms_thresh: 0.5
    dropout_p: 0.15

# -----------------------------
# Augment / Transforms
# -----------------------------
augment:
  # 與 model 同步（TrainTransforms 會將長邊對齊到此值）
  max_side: 1536
  flip_p: 0.5
  color_jitter_prob: 0.2
  color_jitter: [0.25, 0.12, 0.12, 0.05]
  hsv: [0.02, 0.3, 0.2]
  resize: null
  mosaic: false

  # 啟用 PhotometricAug（只改像素、不動 bbox）
  enable_photometric: true
  photometric_cfg:
    p_color_jitter: 0.8
    brightness: 0.25
    contrast: 0.25
    saturation: 0.25
    hue: 0.04
    p_gray: 0.05
    p_autocontrast: 0.30
    p_equalize: 0.20
    p_gamma: 0.60
    gamma_range: [0.80, 1.30]
    p_sharpen: 0.15
    sharpness: [0.95, 1.15]
    p_blur: 0.10
    blur_radius: [0.4, 0.9]
    p_clahe: 0.60          # 若環境無 cv2，程式會自動關閉
    clahe_clip: 2.0
    clahe_grid: [8, 8]
    p_gray_world_wb: 0.35

# -----------------------------
# Train
# -----------------------------
train:
  epochs: 100
  batch_size: 2
  accumulate: 4
  amp: true
  cudnn_benchmark: true
  grad_clip: 10
  freeze_backbone_epochs: 18

  model_ema:
    enabled: true
    decay: 0.9990

  early_stop:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 8
    save_best: true
    best_name: ${project.run_name}_best.pth

  optimizer:
    type: sgd
    lr: 0.0035
    momentum: 0.9
    nesterov: false
    weight_decay: 0.0005
    head_lr_mult: 1.0
    backbone_lr_mult: 0.33

# -----------------------------
# Scheduler
# -----------------------------
scheduler:
  name: cosine
  warmup:
    type: linear
    steps: 1000
    start_factor: 0.1
  min_lr_ratio: 0.15

# -----------------------------
# Dataloader
# -----------------------------
dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

# -----------------------------
# Sanity Check
# -----------------------------
sanity_check:
  enabled: true
  batch_size: 1
  max_side: 1536

# -----------------------------
# Checkpoint & Logging
# -----------------------------
checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

# -----------------------------
# Eval
# -----------------------------
eval:
  run_after_train: true
  iou_thresholds: [0.50,0.55,0.60,0.65,0.70,0.75,0.80,0.85,0.90,0.95]
  max_det: 300
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]
    medium: [1024, 9216]
    large:  [9216, 1e10]

# -----------------------------
# Infer (保持與訓練一致的後處理)
# -----------------------------
infer:
  score_thr: 0.40
  nms_iou: 0.5
  submission_csv: submissions/${project.run_name}_submission.csv

device:
  cuda: true
