# =========================
# hw1_od · fasterrcnn_v7 (Small-object oriented, R101 + FPN P2~P6 + Big RoI Head)
# 重點：更深骨幹（ResNet-101）、更密錨點（min=8）、更大 RoI Head（4FC×1024, pool=14x14）
# 目的：從「模型能力」端解決 train/val loss ~0.6 的平台、提升小物件召回與定位穩定度
# =========================

seed: 42

project:
  name: hw1_od
  run_name: fasterrcnn_v7
  output_root: experiments/logs
  output_dir: ${project.output_root}/${project.run_name}

data:
  root: data
  train_img_dir: data/train/img
  train_gt: data/train/gt_train.txt
  val_img_dir: data/val/img
  val_gt: data/val/gt_val.txt
  test_img_dir: data/test/img
  num_workers: 16
  allow_float_bbox: true
  clip_bbox_to_image: true
  drop_invalid_bbox: true
  min_box_wh: [1, 1]

model:
  detector: fasterrcnn_r101_fpn_v7
  num_classes: 2            # torchvision Faster R-CNN: 含背景 → 單類別時填 2
  # 影像正規化（需與 augment.normalize_mean_std 對齊）
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

  # 解析度對齊（避免二次縮放）
  min_size: 1280
  max_size: 1280

  # FPN / Norm
  fpn_out_channels: 256
  use_p6: true              # 產生 P6（C5 上 MaxPool），小物件/大視角更穩
  norm: "groupnorm32"       # 從零訓練更穩；可選：bn / frozenbn / groupnorm32

  # Anchors（小物件友善：min=8、含長條 3.0）
  rpn_anchor_sizes: [8, 16, 32, 64, 128, 256]
  rpn_anchor_ratios: [0.5, 1.0, 2.0, 3.0]

  # RPN（多收候選，密集場景用）
  rpn:
    batch_size_per_image: 1024
    positive_fraction: 0.5
    fg_iou_thresh: 0.6
    bg_iou_thresh: 0.2
    pre_nms_top_n_train: 6000
    post_nms_top_n_train: 3000
    pre_nms_top_n_test:  3000
    post_nms_top_n_test: 1500
    nms_thresh: 0.7

  # RoI / Head（大容量）
  roi:
    box_batch_size_per_image: 1024
    box_positive_fraction: 0.25
    roi_pool_size: 14
    head_hidden_dim: 1024
    head_num_fc: 4
    bbox_reg_weights: [10.0, 10.0, 5.0, 5.0]   # 小框定位更穩
    nms_thresh: 0.5
    detections_per_img: 300
    score_thresh: 0.0

train:
  epochs: 3     #72
  batch_size: 2
  accumulate: 8                # 有效 batch = 16
  amp: true
  cudnn_benchmark: true
  grad_clip_norm: 1.0
  model_ema:
    enabled: true
    decay: 0.9995
  # 可選的早停（以防災）
  early_stop:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 8
    save_best: true
    best_name: ${project.run_name}_best.pth

optimizer:
  name: sgd
  lr: 0.012                    # 若 v6 用 0.01，這裡 ×1.2 起跑
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: cosine
  warmup:
    type: linear
    steps: 1500
    start_factor: 0.1

augment:
  # 多尺度訓練（短邊候選），長邊 cap 於 max_side
  resize_scales: [1024, 1280, 1536]
  horizontal_flip: true
  color_jitter: [0.1, 0.1, 0.1, 0.05]   # brightness, contrast, saturation, hue
  gaussian_blur_prob: 0.10
  gaussian_blur_sigma: [0.1, 1.0]
  random_noise_prob: 0.10

  # 目標導向 zoom-in：放大小物件、減少無效背景
  zoom_in_crop:
    enabled: true
    min_side: 640
    max_side: 896
    keep_min_area: 0.7
    min_box_area: 16

  # 與 model.image_mean/std 保持一致
  normalize_mean_std: [[0.485, 0.456, 0.406],[0.229, 0.224, 0.225]]

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true

sanity_check:
  enabled: true
  batch_size: 1
  max_side: 640

checkpoint:
  dir: ${project.output_dir}
  name: ${project.run_name}.pth
  save_last_only: false
  save_full_path: ${checkpoint.dir}/${checkpoint.name}

logging:
  csv_name: train_log.csv
  csv_path: ${project.output_dir}/${logging.csv_name}
  print_interval: 10

eval:
  run_after_train: true
  max_dets: 300
  iou_types: ["bbox"]
  print_small_ap: true
  save_dir: experiments/eval_results
  result_txt: ${eval.save_dir}/${project.run_name}_results.txt
  result_json: ${eval.save_dir}/${project.run_name}_details.json
  breakdown_by_area: true
  area_ranges:
    small:  [0, 1024]        # 32^2
    medium: [1024, 9216]     # 96^2
    large:  [9216, 1e10]

infer:
  # 與訓練期一致的基本門檻；推論端不做進階花招（先聚焦模型體質）
  score_thr: 0.05
  nms_iou: 0.5
  topk_per_image: 300
  submission_csv: submissions/${project.run_name}_submission.csv
